<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Next.js 14 → 15 完整參考指南</title>
<meta name="description" content="Next.js 14 → 15 核心功能與最佳實踐完整參考（App Router, RSC, Caching, Server Actions, PPR, Async APIs）" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.css" />
<style>
  :root {
    --accent: #7c5cff;
    --accent-2: #00b8d9;
    --v14: #2f86eb;
    --v15: #a855f7;
    --breaking: #ef4444;
    --ok: #22c55e;
    --warn: #f59e0b;
    --radius: 14px;
    --sidebar-w: 300px;
    --maxw: 900px;
    --font-sans: 'Inter', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  [data-theme="dark"] {
    --bg: #0b0d12;
    --bg-soft: #12151c;
    --bg-card: #151922;
    --bg-elev: #1b2029;
    --border: #242a36;
    --border-soft: #1c222c;
    --text: #e6e9ef;
    --text-soft: #9aa3b2;
    --text-faint: #6b7382;
    --shadow: 0 10px 30px rgba(0,0,0,.45);
  }
  [data-theme="light"] {
    --bg: #f7f8fb;
    --bg-soft: #ffffff;
    --bg-card: #ffffff;
    --bg-elev: #f1f3f8;
    --border: #e3e7ee;
    --border-soft: #eef1f6;
    --text: #1a1f29;
    --text-soft: #5a6473;
    --text-faint: #8b94a3;
    --shadow: 0 10px 30px rgba(20,30,60,.08);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ===== Top bar ===== */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 14px;
    height: 60px; padding: 0 20px;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; letter-spacing: -.01em; }
  .topbar .brand .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px;
  }
  .topbar .spacer { flex: 1; }
  .pill {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-soft);
  }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg-elev); color: var(--text); cursor: pointer; font-size: 16px;
    display: grid; place-items: center; transition: .15s;
  }
  .icon-btn:hover { border-color: var(--accent); }
  .menu-toggle { display: none; }

  /* ===== Layout ===== */
  .layout { display: flex; align-items: flex-start; }
  .sidebar {
    position: sticky; top: 60px; flex: 0 0 var(--sidebar-w); width: var(--sidebar-w);
    height: calc(100vh - 60px); overflow-y: auto; padding: 20px 14px 60px;
    border-right: 1px solid var(--border);
  }
  .sidebar .search {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg-elev); color: var(--text);
    font-family: var(--font-sans); font-size: 13px; margin-bottom: 16px;
  }
  .sidebar .search:focus { outline: none; border-color: var(--accent); }
  .nav-group-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-faint); margin: 18px 8px 8px;
  }
  .nav a {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 8px; color: var(--text-soft);
    font-size: 13.5px; font-weight: 500; line-height: 1.35;
  }
  .nav a:hover { background: var(--bg-elev); color: var(--text); text-decoration: none; }
  .nav a.active { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--text); font-weight: 600; }
  .nav a .num { font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; min-width: 18px; }
  .nav a.active .num { color: var(--accent); }

  /* ===== Content ===== */
  .content { flex: 1; min-width: 0; padding: 40px clamp(20px, 5vw, 64px) 120px; }
  .content-inner { max-width: var(--maxw); margin: 0 auto; }

  .hero { margin-bottom: 48px; }
  .hero .eyebrow { color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; }
  .hero h1 { font-size: clamp(30px, 5vw, 46px); font-weight: 800; letter-spacing: -.02em; margin: 10px 0 14px; line-height: 1.1; }
  .hero .lead { font-size: 17px; color: var(--text-soft); max-width: 760px; }
  .hero .meta-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
  .meta-chip { font-size: 12.5px; padding: 6px 12px; border-radius: 999px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-soft); }
  .meta-chip b { color: var(--text); }

  section.topic { scroll-margin-top: 80px; margin-bottom: 56px; }
  .topic-head { border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 24px; }
  .topic-head h2 {
    font-size: 27px; font-weight: 800; letter-spacing: -.015em; margin: 0 0 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .topic-head .idx {
    font-size: 14px; font-weight: 700; color: var(--accent);
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; flex: none;
  }
  .topic-head .summary { color: var(--text-soft); font-size: 15.5px; margin: 0; }

  .sub { margin: 28px 0; }
  .sub h3 {
    font-size: 18.5px; font-weight: 700; letter-spacing: -.01em; margin: 0 0 10px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .sub .body { color: var(--text); font-size: 15px; }
  .sub .body p { margin: 0 0 10px; }
  .sub .body ul { margin: 6px 0 12px; padding-left: 22px; }
  .sub .body li { margin: 4px 0; color: var(--text); }
  .sub .body code, .inline-code {
    font-family: var(--font-mono); font-size: 12.8px; padding: 2px 6px; border-radius: 6px;
    background: var(--bg-elev); border: 1px solid var(--border-soft); color: var(--accent-2);
  }
  [data-theme="light"] .sub .body code { color: #b4308a; }

  /* version badge */
  .vbadge { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: .01em; white-space: nowrap; }
  .vbadge.v14 { background: color-mix(in srgb, var(--v14) 18%, transparent); color: var(--v14); border: 1px solid color-mix(in srgb, var(--v14) 35%, transparent); }
  .vbadge.v15 { background: color-mix(in srgb, var(--v15) 18%, transparent); color: var(--v15); border: 1px solid color-mix(in srgb, var(--v15) 35%, transparent); }
  .vbadge.breaking { background: color-mix(in srgb, var(--breaking) 16%, transparent); color: var(--breaking); border: 1px solid color-mix(in srgb, var(--breaking) 38%, transparent); }
  .vbadge.generic { background: var(--bg-elev); color: var(--text-soft); border: 1px solid var(--border); }

  /* code blocks */
  pre[class*="language-"] {
    border-radius: var(--radius); border: 1px solid var(--border);
    margin: 14px 0; font-size: 13px; box-shadow: var(--shadow);
  }
  pre[class*="language-"], code[class*="language-"] { font-family: var(--font-mono) !important; }
  div.code-toolbar > .toolbar { opacity: 1; }
  div.code-toolbar > .toolbar .toolbar-item > button,
  div.code-toolbar > .toolbar .toolbar-item > span {
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    background: var(--bg-elev) !important; color: var(--text-soft) !important;
    border: 1px solid var(--border) !important; border-radius: 7px !important; padding: 3px 9px !important;
    box-shadow: none !important;
  }
  div.code-toolbar > .toolbar .toolbar-item > button:hover { color: var(--text) !important; border-color: var(--accent) !important; }
  .code-lang-label { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--text-faint); }

  /* callouts */
  .callout { border-radius: 12px; padding: 12px 14px 12px 16px; margin: 10px 0; font-size: 14px; border: 1px solid var(--border); position: relative; }
  .callout .ct { font-weight: 700; font-size: 12.5px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
  .callout ul { margin: 0; padding-left: 20px; }
  .callout li { margin: 3px 0; }
  .callout.bp { background: color-mix(in srgb, var(--ok) 9%, transparent); border-color: color-mix(in srgb, var(--ok) 30%, transparent); }
  .callout.bp .ct { color: var(--ok); }
  .callout.gotcha { background: color-mix(in srgb, var(--warn) 9%, transparent); border-color: color-mix(in srgb, var(--warn) 30%, transparent); }
  .callout.gotcha .ct { color: var(--warn); }
  .callout.fix { background: color-mix(in srgb, var(--accent-2) 9%, transparent); border-color: color-mix(in srgb, var(--accent-2) 30%, transparent); }
  .callout.fix .ct { color: var(--accent-2); }

  /* migration table */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  table.mig { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 640px; }
  table.mig th, table.mig td { text-align: left; padding: 12px 14px; vertical-align: top; border-bottom: 1px solid var(--border-soft); }
  table.mig thead th { background: var(--bg-elev); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-soft); position: sticky; top: 0; }
  table.mig tbody tr:last-child td { border-bottom: none; }
  table.mig td .change { font-weight: 600; }
  table.mig td .action { color: var(--text-soft); }

  /* glossary */
  .glossary { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .gloss-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .gloss-card .term { font-weight: 700; font-size: 14.5px; margin-bottom: 4px; color: var(--accent); }
  .gloss-card .def { font-size: 13.5px; color: var(--text-soft); }

  /* citations */
  .citations { margin-top: 16px; font-size: 12.5px; color: var(--text-faint); }
  .citations .lbl { font-weight: 600; margin-right: 6px; }
  .citations a { color: var(--text-soft); word-break: break-all; }

  .note-banner { background: color-mix(in srgb, var(--accent) 10%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 12px; padding: 14px 16px; font-size: 14px; margin: 18px 0 0; }
  .no-results { color: var(--text-faint); font-style: italic; padding: 40px 0; text-align: center; display: none; }

  .footer { border-top: 1px solid var(--border); margin-top: 40px; padding-top: 24px; color: var(--text-faint); font-size: 13px; }

  /* responsive */
  .backdrop { display: none; }
  @media (max-width: 980px) {
    .menu-toggle { display: grid; }
    .sidebar {
      position: fixed; top: 60px; left: 0; z-index: 60; height: calc(100vh - 60px);
      transform: translateX(-100%); transition: transform .25s ease; background: var(--bg-soft);
    }
    .sidebar.open { transform: translateX(0); box-shadow: var(--shadow); }
    .backdrop.show { display: block; position: fixed; inset: 60px 0 0 0; z-index: 55; background: rgba(0,0,0,.5); }
  }
  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>
  <div class="topbar">
    <button class="icon-btn menu-toggle" id="menuToggle" aria-label="開啟選單">☰</button>
    <div class="brand"><span class="logo">N</span><span>Next.js 14 → 16 指南</span></div>
    <span class="spacer"></span>

      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="content">
      <div class="content-inner" id="root"></div>
      <div class="no-results" id="noResults">找不到符合的內容</div>
    </main>
  </div>

        "term": "React Server Components (RSC)",

      {
        "term": "Static Rendering",

      },
      {
        "term": "Dynamic Rendering",

      },
      {
        "term": "Streaming",
        "definition": "把頁面拆成多個 chunk，render 好一塊就先傳一塊；搭配 Suspense 與 loading.js 讓 static shell 先到、dynamic 內容後到。"
      },
      {
        "term": "Partial Prerendering (PPR)",

        "term": "Request Memoization",

      },
      {
        "term": "Data Cache",
        "definition": "跨 request、跨部署持久的伺服器端資料快取，由 fetch 的 cache/revalidate 控制，可用 revalidateTag / revalidatePath 失效。Next 15 起 fetch 預設不進此快取。"
      },
      {
        "term": "Full Route Cache",
        "definition": "build time 對 static route 快取整份 render 結果（RSC payload + HTML）存在 server，供之後請求直接命中；route 變 dynamic 時不適用。"

        "term": "Router Cache (Client-side)",

        "term": "Server Actions",
        "definition": "標記 \"use server\" 的 async function，在 server 執行、可被 Server/Client Component 呼叫，用於表單提交與 mutation；支援 progressive enhancement，並可在內部呼叫 revalidatePath/revalidateTag/redirect。"

      ]
    }
  ]
}
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
  <script>
    if (window.Prism && Prism.plugins && Prism.plugins.autoloader) {
      Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
    }

    const DATA = JSON.parse(document.getElementById('guide-data').textContent);

    const esc = (s) => String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // mini markdown: lines, "- " lists, **bold**, `code`
    const inline = (s) => esc(s)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');

    const renderBody = (text) => {
      if (!text) return '';
      const lines = String(text).split('\n');
      let html = '', list = [];
      const flush = () => { if (list.length) { html += '<ul>' + list.map(li => '<li>' + inline(li) + '</li>').join('') + '</ul>'; list = []; } };
      for (const ln of lines) {
        const t = ln.trim();
        if (/^[-*]\s+/.test(t)) { list.push(t.replace(/^[-*]\s+/, '')); }
        else if (t === '') { flush(); }
        else { flush(); html += '<p>' + inline(t) + '</p>'; }
      }
      flush();
      return html;
    };

    const versionBadge = (v) => {
      if (!v) return '';
      const low = String(v).toLowerCase();
      let cls = 'generic';
      if (low.includes('break')) cls = 'breaking';
      else if (low.includes('15')) cls = 'v15';
      else if (low.includes('14')) cls = 'v14';
      const label = low.includes('break') ? '⚠ Breaking · v' + v.replace(/[^0-9.]/g, '') : 'v' + v;
      return '<span class="vbadge ' + cls + '">' + esc(cls === 'breaking' ? label : 'v' + v) + '</span>';
    };

    const langLabel = (l) => '<span class="code-lang-label">' + esc((l || 'tsx').toUpperCase()) + '</span>';

    const renderSection = (s) => {
      let h = '<div class="sub">';
      h += '<h3>' + inline(s.heading) + (s.version ? ' ' + versionBadge(s.version) : '') + '</h3>';
      h += '<div class="body">' + renderBody(s.body) + '</div>';
      if (s.code && s.code.trim()) {
        const lang = (s.codeLang || 'tsx').replace(/[^a-z0-9]/gi, '') || 'tsx';
        h += '<pre class="language-' + lang + '" data-prismjs-copy="複製" data-prismjs-copy-success="已複製 ✓"><code class="language-' + lang + '">' + esc(s.code) + '</code></pre>';
      }
      if (s.bestPractices && s.bestPractices.length) {
        h += '<div class="callout bp"><div class="ct">✓ Best Practice</div><ul>' + s.bestPractices.map(b => '<li>' + inline(b) + '</li>').join('') + '</ul></div>';
      }
      if (s.gotchas && s.gotchas.length) {
        h += '<div class="callout gotcha"><div class="ct">⚠ Gotcha 易錯點</div><ul>' + s.gotchas.map(g => '<li>' + inline(g) + '</li>').join('') + '</ul></div>';
      }
      h += '</div>';
      return h;
    };

    const renderVerdicts = (verdicts) => {
      if (!verdicts || !verdicts.length) return '';
      const fixes = verdicts.filter(v => v && (v.verdict === 'refuted' || v.verdict === 'uncertain') && v.correction && v.correction.trim());
      if (!fixes.length) return '';
      let h = '<div class="callout fix"><div class="ct">🔎 查證修正</div><ul>';
      h += fixes.map(v => '<li>' + inline(v.correction) + (v.source ? ' <a href="' + esc(v.source) + '" target="_blank" rel="noopener">(來源)</a>' : '') + '</li>').join('');
      h += '</ul></div>';
      return h;
    };

    const renderCitations = (cits) => {
      if (!cits || !cits.length) return '';
      return '<div class="citations"><span class="lbl">參考：</span>' +
        cits.map(c => '<a href="' + esc(c) + '" target="_blank" rel="noopener">' + esc(c) + '</a>').join(' · ') + '</div>';
    };

    const render = () => {
      const root = document.getElementById('root');
      const nav = document.getElementById('nav');
      const m = DATA.meta || {};
      const syn = DATA.synthesis || {};
      const topics = DATA.topics || [];

      document.title = m.title || document.title;
      document.getElementById('versionPill').textContent = m.versionRange || 'App Router';

      let html = '';
      // hero
      html += '<div class="hero" id="overview">';
      html += '<div class="eyebrow">完整參考指南</div>';
      html += '<h1>' + esc(m.title || 'Next.js 指南') + '</h1>';
      if (m.subtitle) html += '<p class="lead">' + esc(m.subtitle) + '</p>';
      if (syn.intro) html += '<p class="lead" style="margin-top:14px">' + inline(syn.intro) + '</p>';
      html += '<div class="meta-row">';
      if (m.versionRange) html += '<span class="meta-chip">版本範圍 <b>' + esc(m.versionRange) + '</b></span>';
      if (m.generatedDate) html += '<span class="meta-chip">產生日期 <b>' + esc(m.generatedDate) + '</b></span>';
      html += '<span class="meta-chip">主題數 <b>' + topics.length + '</b></span>';
      html += '</div>';
      if (m.latestVersionNote) html += '<div class="note-banner">📌 <b>最新版本</b>：' + inline(m.latestVersionNote) + '</div>';
      html += '</div>';

      // migration cheatsheet
      const mig = syn.migrationCheatsheet || [];
      if (mig.length) {
        html += '<section class="topic" id="migration"><div class="topic-head"><h2><span class="idx">↗</span>14 → 15 升級重點 <span style="font-size:14px;font-weight:500;color:var(--text-soft)">Migration Cheatsheet</span></h2><p class="summary">從 Next.js 14 升級到 15 必須注意的 breaking changes 與行為變更。</p></div>';
        html += '<div class="table-wrap"><table class="mig"><thead><tr><th>變更 Change</th><th>影響 Impact</th><th>該怎麼做 Action</th><th>版本</th></tr></thead><tbody>';
        html += mig.map(r => '<tr><td><span class="change">' + inline(r.change) + '</span></td><td>' + inline(r.impact || '') + '</td><td class="action">' + inline(r.action || '') + '</td><td>' + (r.version ? versionBadge(r.version) : '') + '</td></tr>').join('');
        html += '</tbody></table></div></section>';
      }

      // topics
      topics.forEach((t, i) => {
        html += '<section class="topic" id="' + esc(t.topicId) + '" data-search="' + esc((t.title + ' ' + t.summary + ' ' + (t.sections || []).map(s => s.heading + ' ' + s.body).join(' ')).toLowerCase()) + '">';
        html += '<div class="topic-head"><h2><span class="idx">' + (i + 1) + '</span>' + esc(t.title) + '</h2>';
        html += '<p class="summary">' + inline(t.summary) + '</p></div>';
        (t.sections || []).forEach(s => { html += renderSection(s); });
        html += renderVerdicts(t.verdicts);
        html += renderCitations(t.citations);
        html += '</section>';
      });

      // glossary
      const gl = syn.glossary || [];
      if (gl.length) {
        html += '<section class="topic" id="glossary"><div class="topic-head"><h2><span class="idx">📖</span>Glossary 術語表</h2><p class="summary">核心術語快速查詢。</p></div>';
        html += '<div class="glossary">' + gl.map(g => '<div class="gloss-card"><div class="term">' + esc(g.term) + '</div><div class="def">' + inline(g.definition) + '</div></div>').join('') + '</div></section>';
      }

      html += '<div class="footer">由 Claude Code workflow 研究 + 查證生成 · 內容以 nextjs.org 官方文件為主要依據 · 開啟連結查看最新官方說明。</div>';

      root.innerHTML = html;

      // nav
      let navHtml = '<div class="nav-group-title">總覽</div>';
      navHtml += '<a href="#overview" data-target="overview"><span class="num">—</span>開場 Overview</a>';
      if (mig.length) navHtml += '<a href="#migration" data-target="migration"><span class="num">↗</span>14 → 15 升級重點</a>';
      navHtml += '<div class="nav-group-title">核心主題</div>';
      topics.forEach((t, i) => {
        navHtml += '<a href="#' + esc(t.topicId) + '" data-target="' + esc(t.topicId) + '"><span class="num">' + (i + 1) + '</span>' + esc(t.title) + '</a>';
      });
      if (gl.length) { navHtml += '<div class="nav-group-title">附錄</div><a href="#glossary" data-target="glossary"><span class="num">📖</span>Glossary 術語表</a>'; }
      nav.innerHTML = navHtml;

      if (window.Prism) Prism.highlightAll();
      setupScrollSpy();
    };

    // scroll spy
    let spyObserver;
    const setupScrollSpy = () => {
      const links = Array.from(document.querySelectorAll('.nav a'));
      const map = {};
      links.forEach(a => map[a.dataset.target] = a);
      if (spyObserver) spyObserver.disconnect();
      spyObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            links.forEach(a => a.classList.remove('active'));
            const id = e.target.id;
            if (map[id]) map[id].classList.add('active');
          }
        });
      }, { rootMargin: '-70px 0px -75% 0px', threshold: 0 });
      document.querySelectorAll('section.topic, #overview').forEach(s => spyObserver.observe(s));
    };

    // search
    const setupSearch = () => {
      const input = document.getElementById('search');
      const noRes = document.getElementById('noResults');
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        const sections = Array.from(document.querySelectorAll('section.topic[data-search]'));
        let visible = 0;
        sections.forEach(sec => {
          const hit = !q || sec.dataset.search.includes(q) || sec.id.includes(q);
          sec.style.display = hit ? '' : 'none';
          if (hit) visible++;
        });
        // also filter nav core-topic links
        document.querySelectorAll('.nav a[data-target]').forEach(a => {
          const sec = document.getElementById(a.dataset.target);
          if (sec && sec.classList.contains('topic') && sec.dataset.search !== undefined) {
            a.style.display = (sec.style.display === 'none') ? 'none' : '';
          }
        });
        noRes.style.display = (q && visible === 0) ? 'block' : 'none';
      });
    };

    // theme toggle
    const setupTheme = () => {
      const btn = document.getElementById('themeToggle');
      const apply = (t) => { document.documentElement.dataset.theme = t; btn.textContent = t === 'dark' ? '🌙' : '☀️'; };
      let cur = 'dark';
      try { cur = localStorage.getItem('nextguide-theme') || 'dark'; } catch (e) {}
      apply(cur);
      btn.addEventListener('click', () => {
        cur = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        apply(cur);
        try { localStorage.setItem('nextguide-theme', cur); } catch (e) {}
      });
    };

    // mobile menu
    const setupMenu = () => {
      const sb = document.getElementById('sidebar');
      const bd = document.getElementById('backdrop');
      const close = () => { sb.classList.remove('open'); bd.classList.remove('show'); };
      document.getElementById('menuToggle').addEventListener('click', () => { sb.classList.toggle('open'); bd.classList.toggle('show'); });
      bd.addEventListener('click', close);
      document.getElementById('nav').addEventListener('click', (e) => { if (e.target.closest('a')) close(); });
    };

    render();
    setupSearch();
    setupTheme();
    setupMenu();
  </script>
</body>
</html>
